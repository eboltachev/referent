services:
  postgres:
    image: pgvector/pgvector:pg16
    env_file: .env
    expose: ["5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck: {test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"], interval: 10s, timeout: 5s, retries: 5}
  redis:
    image: redis:7-alpine
    expose: ["6379"]
    healthcheck: {test: ["CMD", "redis-cli", "ping"], interval: 10s, timeout: 5s, retries: 5}
  backend:
    build: ./backend
    env_file: .env
    expose: ["8000"]
    volumes: [uploads:/data/uploads, exports:/data/exports]
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
    command: sh -c "uv run alembic upgrade head && uv run uvicorn src.main:app --host 0.0.0.0 --port 8000"
    healthcheck: {test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"], interval: 10s, timeout: 5s, retries: 5}
  worker:
    build: ./backend
    env_file: .env
    expose: []
    volumes: [uploads:/data/uploads, exports:/data/exports]
    depends_on:
      backend: {condition: service_healthy}
    command: uv run python -m src.worker
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
  frontend:
    build: ./frontend
    ports: ["${FRONTEND_PORT:-6004}:80"]
    depends_on: [backend]
volumes: {pgdata: {}, uploads: {}, exports: {}}
